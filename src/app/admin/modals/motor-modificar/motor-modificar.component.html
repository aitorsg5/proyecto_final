<div class="modal-header">
  <h5 class="modal-title">Modificar Motor</h5>
  <button type="button" class="close" aria-label="Close" (click)="cerrarModal()">
    <span aria-hidden="true">&times;</span>
  </button>
</div>
<div class="modal-body">
  <form *ngIf="motor">
    <div class="form-group">
      <label for="name">Motor</label>
      <input type="text" id="name" [(ngModel)]="motor.motor" name="motor" class="form-control" placeholder="motor" />
    </div>
  </form>
</div>
<div class="modal-footer">
  <button type="button" class="btn btn-primary" (click)="guardarCambios()">Guardar Cambios</button>
  <button type="button" class="btn btn-secondary" (click)="cerrarModal()">Cerrar</button>
</div>
