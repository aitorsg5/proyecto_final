<div class="modal-header">
      <h5 class="modal-title">Modificar Caballos</h5>
      <button type="button" class="close" aria-label="Close" (click)="cerrarModal()">
        <span aria-hidden="true">&times;</span>
      </button>
    </div>
    <div class="modal-body">
      <form *ngIf="caballos">
        <div class="form-group">
          <label for="name">Caballos</label>
          <input type="text" id="name" [(ngModel)]="caballos.caballos" name="caballos" class="form-control" placeholder="Caballos" />
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button type="button" class="btn btn-primary" (click)="guardarCambios()">Guardar Cambios</button>
      <button type="button" class="btn btn-secondary" (click)="cerrarModal()">Cerrar</button>
    </div>
