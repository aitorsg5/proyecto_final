<div class="modal-header">
      <h5 class="modal-title">Modificar Caja</h5>
      <button type="button" class="close" aria-label="Close" (click)="cerrarModal()">
        <span aria-hidden="true">&times;</span>
      </button>
    </div>
    <div class="modal-body">
      <form *ngIf="caja">
        <div class="form-group">
          <label for="nombre_caja">Nombre Caja</label>
          <input type="text" id="nombre_caja" [(ngModel)]="caja.nombre_caja" name="nombre_caja" class="form-control" placeholder="Nombre de la caja" />
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button type="button" class="btn btn-primary" (click)="guardarCambios()">Guardar Cambios</button>
      <button type="button" class="btn btn-secondary" (click)="cerrarModal()">Cerrar</button>
    </div>
