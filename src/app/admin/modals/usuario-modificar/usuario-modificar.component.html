<div class="modal-header">
  <h5 class="modal-title">Modificar Usuario</h5>
  <button type="button" class="close" aria-label="Close" (click)="cerrarModal()">
    <span aria-hidden="true">&times;</span>
  </button>
</div>
<div class="modal-body">
  <form *ngIf="usuario">
    <div class="form-group">
      <label for="name">Nombre</label>
      <input type="text" id="name" [(ngModel)]="usuario.nombre" name="nombre" class="form-control" placeholder="Nombre del usuario" />
    </div>
    <div class="form-group">
      <label for="email">Correo Electrónico</label>
      <input type="email" id="email" [(ngModel)]="usuario.email" name="email" class="form-control" placeholder="Correo del usuario" />
    </div>
    <div class="form-group">
      <label for="direccion">Dirección</label>
      <input type="text" id="direccion" [(ngModel)]="usuario.direccion" name="direccion" class="form-control" placeholder="Dirección del usuario" />
    </div>
    <div class="form-group">
      <label for="password">Contraseña</label>
      <input type="password" id="password" [(ngModel)]="usuario.password" name="password" class="form-control" placeholder="Nueva contraseña" />
    </div>
    <div class="form-group form-check">
      <input type="checkbox" class="form-check-input" id="estado" [(ngModel)]="usuario.estado" name="estado" [checked]="usuario.estado === 'activo'" (change)="cambiarEstado($event)">
      <label class="form-check-label" for="estado">{{usuario.estado === 'activo' ? 'Activo' : 'Deshabilitado'}}</label>
    </div>
    <div class="form-group form-check">
      <input type="checkbox" class="form-check-input" id="rol" [(ngModel)]="usuario.es_admin" name="es_admin" [checked]="usuario.es_admin" (change)="cambiarRol($event)">
      <label class="form-check-label" for="rol">{{usuario.es_admin ? 'Admin' : 'Usuario'}}</label>
    </div>
  </form>
</div>
<div class="modal-footer">
  <button type="button" class="btn btn-primary" (click)="guardarCambios()">Guardar Cambios</button>
  <button type="button" class="btn btn-secondary" (click)="cerrarModal()">Cerrar</button>
</div>
