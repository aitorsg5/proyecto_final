<div class="modal-header">
      <h5 class="modal-title">Modificar Carburante</h5>
      <button type="button" class="close" aria-label="Close" (click)="cerrarModal()">
        <span aria-hidden="true">&times;</span>
      </button>
    </div>
    <div class="modal-body">
      <form *ngIf="carburante">
        <div class="form-group">
          <label for="carburante">Carburante</label>
          <input type="text" id="carburante" [(ngModel)]="carburante.carburante" name="carburante" class="form-control" placeholder="Nombre del carburante" />
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button type="button" class="btn btn-primary" (click)="guardarCambios()">Guardar Cambios</button>
      <button type="button" class="btn btn-secondary" (click)="cerrarModal()">Cerrar</button>
    </div>
