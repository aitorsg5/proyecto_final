<app-menu></app-menu>
<table class="table table-hover table-dark">
  <thead>
    <tr>
      <th scope="col">#</th>
      <th scope="col">motor</th>
      <th scope="col">Acciones</th>
      <th scope="col"></th>
    </tr>
  </thead>
  <tbody>
    <tr>
      <th scope="row">Nuevo</th>
      <td><input class="usuario-admin" type="text" placeholder="Nombre" [(ngModel)]="nuevoMotor.motor" required></td>
      <td><button  class="btn btn-secondary" (click)="crearMotores()"> Crear</button></td>
      <td><button class="btn btn-primary"(click)="resetFormulario()"> limpiar</button></td>
    </tr>

    <tr *ngFor="let Motor of Motores">
      <th scope="row">{{Motor.id_motor}}</th>
      <td>{{Motor.motor}}</td>
 
      <td><button  class="btn btn-danger" (click)="eliminarMotor(Motor.id_motor)" > Eliminar</button></td>
      <td><button  class="btn btn-success" (click)="IrAModificarMotor(Motor)">Modificar</button></td>

    </tr>
  
  </tbody>

</table>
